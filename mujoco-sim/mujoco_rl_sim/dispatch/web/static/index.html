<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Prometheus — 分散強化学習</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="hero-brand">
      <h1 class="hero-title">Prometheus</h1>
      <p class="brand-tagline">分散強化学習システム</p>
    </div>
    <nav class="main-nav" aria-label="メイン">
      <a href="/">ダッシュボード</a>
      <a href="/checkpoints">チェックポイント</a>
    </nav>
    <div class="header-toolbar">
      <label>API token <input id="token" type="password" placeholder="X-Dispatch-Token" /></label>
      <button id="refresh">更新</button>
    </div>
  </header>

  <section>
    <h2>Sweeps</h2>
    <table id="sweeps"><thead>
      <tr><th>sweep_id</th><th>exp</th><th>queued</th><th>running</th><th>ok</th><th>fail</th><th>actions</th></tr>
    </thead><tbody></tbody></table>
  </section>

  <section>
    <h2>Workers</h2>
    <table id="workers"><thead>
      <tr><th>worker_id</th><th>host</th><th>状態</th><th>slots</th><th>active</th><th>last heartbeat (JST)</th></tr>
    </thead><tbody></tbody></table>
  </section>

  <section>
    <h2>Jobs (recent)</h2>
    <table id="jobs"><thead>
      <tr><th>sweep_id</th><th>config_id</th><th>seed_id</th><th>seed</th><th>run_id</th><th>status</th><th>progress</th><th>開始 (JST)</th><th>1 update 平均</th><th>worker</th><th>metric</th><th>error</th></tr>
    </thead><tbody></tbody></table>
  </section>

  <div id="config-modal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop" data-close-config-modal></div>
    <div class="modal-panel" role="dialog" aria-labelledby="config-modal-title">
      <header class="modal-header">
        <h3 id="config-modal-title">Config</h3>
        <button type="button" id="config-modal-close" class="modal-close" aria-label="閉じる">×</button>
      </header>
      <p id="config-modal-meta" class="modal-meta"></p>
      <pre id="config-modal-body" class="modal-body"></pre>
    </div>
  </div>

  <script src="/static/common.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
